<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greenhouse (Mock ATS)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Light, corporate theme completely distinct from MeritEngine's dark mode */
        :root {
            --gh-primary: #048259;
            --gh-bg: #f8fafc;
            --gh-surface: #ffffff;
            --gh-border: #e2e8f0;
            --gh-text: #1e293b;
            --gh-text-light: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--gh-bg);
            color: var(--gh-text);
            line-height: 1.5;
        }

        header {
            background-color: var(--gh-surface);
            border-bottom: 1px solid var(--gh-border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--gh-primary);
        }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 2rem;
            background: var(--gh-surface);
            border: 1px solid var(--gh-border);
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        p.subtitle { color: var(--gh-text-light); margin-bottom: 2rem; }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--gh-text);
        }

        input[type="text"], input[type="email"], input[type="number"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--gh-border);
            border-radius: 6px;
            font-size: 0.95rem;
            font-family: inherit;
        }

        input:focus {
            outline: 2px solid var(--gh-primary);
            border-color: transparent;
        }

        .hint {
            display: block;
            font-size: 0.75rem;
            color: var(--gh-text-light);
            margin-top: 0.25rem;
        }

        button.btn-submit {
            background-color: var(--gh-primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-top: 1rem;
        }

        button.btn-submit:hover {
            background-color: #036946;
        }

        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">MockATS</div>
    </header>

    <div class="container">
        <h1>Add New Candidate</h1>
        <p class="subtitle">Enter candidate details. Upon saving, a webhook will fire to the configured endpoint.</p>

        <form id="candidateForm">
            <!-- Webhook Settings -->
            <div style="border: 1px solid var(--gh-border); padding: 1.25rem; border-radius: 6px; margin-bottom: 2rem; background: #f8fafc;">
                <label style="font-size: 0.9rem; color: var(--gh-primary); font-weight: 700; margin-bottom: 0.75rem; display: block;">Webhook Settings</label>
                <div class="two-col">
                    <div class="form-group" style="margin-bottom: 0;">
                        <label>Endpoint URL</label>
                        <input type="text" id="webhook-target-url" placeholder="http://localhost:8000/webhook/ats">
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label>Secret Authentication Token</label>
                        <input type="password" id="webhook-target-secret" placeholder="Enter secret token">
                    </div>
                </div>
            </div>

            <div class="two-col">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="cand-name" placeholder="Jane Doe" required>
                </div>
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="cand-email" placeholder="jane@example.com" required>
                </div>
            </div>

            <div class="form-group">
                <label>Skills Claimed (comma separated) *</label>
                <input type="text" id="cand-skills" placeholder="Python, PostgreSQL, AWS" required>
            </div>

            <div class="form-group">
                <label>GitHub Repositories (comma separated URLs) *</label>
                <input type="text" id="cand-github" placeholder="https://github.com/jane/repo1, https://github.com/jane/repo2">
                <span class="hint">Leave empty if none, or provide valid links. Used to evaluate 'Stream A' criteria.</span>
            </div>

            <div class="two-col">
                <div class="form-group">
                    <label>Notice Period (Days) *</label>
                    <input type="number" id="cand-notice" placeholder="30" required>
                </div>
                <div class="form-group">
                    <label>Expected CTC (LPA) *</label>
                    <input type="number" step="0.1" id="cand-ctc" placeholder="35.0" required>
                </div>
            </div>

            <div class="form-group">
                <label>Assessment Score (0-100) (Optional)</label>
                <input type="number" id="cand-score" placeholder="85" min="0" max="100">
                <span class="hint">Take-home test or initial coding screen result.</span>
            </div>

            <button type="button" id="btn-save" class="btn-submit">Save Candidate & Trigger Webhook</button>
        </form>
    </div>

    <!-- ATS JS Logic -->
    <script src="ats.js"></script>
</body>
</html>
